spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchAutoConfiguration
      - org.springframework.boot.data.elasticsearch.autoconfigure.DataElasticsearchRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long-for-hmac
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

priz:
  security:
    api-key:
      secret-encryption-key: test-aes-encryption-key-min-32chars!!

file:
  upload-dir: ./test-uploads

kafka:
  bootstrap-servers: localhost:9092

app:
  kafka:
    topics:
      file-upload: file-upload-events
      notification: notification-events
    partitions:
      file-upload: 3
      notification: 3
    replicas: 1

telegram:
  enabled: false
discord:
  enabled: false
gmail:
  enabled: false

mcp:
  enabled: true
  github:
    enabled: ${MCP_GITHUB_ENABLED:false}
    token: ${GITHUB_TOKEN:test-placeholder}
    base-url: https://api.github.com
