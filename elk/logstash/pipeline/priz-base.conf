input {
  beats {
    port => 5044
  }
}

filter {
  # 1. Parse HTTP info từ message (nếu message vẫn còn sau khi parse JSON, hoặc dùng trường message trong JSON)
  if [message] =~ /(?:GET|POST|PUT|DELETE|PATCH)/ {
    grok {
      match => { "message" => "%{WORD:http_method} %{URIPATH:request_path}" }
      tag_on_failure => []
    }
  }

  # 2. Classify severity
  if [level] == "ERROR" {
    mutate { add_tag => ["alert", "error"] }
  }
  if [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  # 3. Enrich + normalize field names (ECS-compatible)
  # Fix: Filebeat sends 'host' as an object. We rename it to 'agent' to avoid conflict with 'host.ip'.
  mutate {
    rename => { "host" => "agent" }
  }

  mutate {
    add_field => {
      "[service][name]"  => "priz-base"
      "[event][dataset]" => "priz-base.application"
    }
    rename => {
      # "host" is now "agent", so we don't rename it to "[host][ip]" anymore unless we have a specific source IP
      "level"       => "[log][level]"
      "logger_name" => "[log][logger]"
      "thread_name" => "[process][thread][name]"
    }
    remove_field => ["@version", "port"]
  }

  # 4. Mark DLQ candidates
  if "_jsonparsefailure" in [tags] {
    mutate { add_tag => ["dlq_candidate"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-priz-base-%{+YYYY.MM.dd}"
    action => "create"
    template_name => "logs-priz-base"
    template => "/usr/share/logstash/pipeline/templates/logs-template.json"
    template_overwrite => true
  }
}
